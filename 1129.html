<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Hình Ảnh</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f4f6f9;
}

.header{
    background:#ff5722;
    color:#fff;
    text-align:center;
    padding:25px;
    font-size:22px;
    font-weight:bold;
}

.container{
    max-width:1200px;
    margin:0px auto;
    padding:15px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    transition:.3s;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.card img{
    width:100%;
  
    object-fit:cover;
}

.info{
    padding:15px;
}

.title{
    font-size:20px;
    font-weight:bold;
    margin-bottom:8px;
}

.desc{
    color:#666;
    font-size:14px;
    line-height:22px;
}

.price{
    margin-top:12px;
    color:#e91e63;
    font-size:22px;
    font-weight:bold;
}

button{
    width:100%;
    margin-top:15px;
    padding:12px;
    border:none;
    background:#ff5722;
    color:#fff;
    font-size:16px;
    cursor:pointer;
    border-radius:8px;
}

button:hover{
    background:#e64a19;
}
</style>

</head>
<body>

<div class="header">
🍽 Nhà hàng Wagyu No Kami
</div>

<div class="container">

 

<div class="card">
<img src="1.jpg">
 <img src="2.jpg">
 <img src="3.jpg">
 <img src="4.jpg">
 
</div>
 

 

</div>

</body>
</html>
